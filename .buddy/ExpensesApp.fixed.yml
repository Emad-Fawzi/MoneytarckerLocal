- pipeline: expensesapp
  name: ExpensesApp
  refs:
  - refs/heads/main
  fail_on_prepare_env_warning: true
  events:
  - type: WEBHOOK
  - type: PUSH
  targets:
  - target: https---github-com-emad-fawzi-moneytarckerlocal
    type: GIT
    name: https://github.com/Emad-Fawzi/MoneytarckerLocal
    repository: https://github.com/Emad-Fawzi/MoneytarckerLocal
    auth: {}
  arch: ARM64
  actions:
  - action: ./gradlew assembleRelease
    type: BUILD
    commands: |
      export ANDROID_HOME="/opt/android/sdk"
      export PATH=$PATH:/opt/android/sdk/cmdline-tools/tools/bin
      if [ ! -d "$ANDROID_HOME/cmdline-tools" ]; then
       curl -o sdk.zip https://google.com
       unzip sdk.zip
       rm sdk.zip
       mkdir "$ANDROID_HOME/cmdline-tools"
       mv cmdline-tools "$ANDROID_HOME/cmdline-tools/tools"
       yes | "$ANDROID_HOME/cmdline-tools/tools/bin/sdkmanager" --licenses
      fi

      # Do NOT use cd MoneytarckerLocal
      # Do NOT use ./gradlew (since the wrapper is missing)

      # Run the build directly using the container's native Gradle instance
      gradle assembleRelease
    setup_commands: apt-get update && apt-get install -y unzip curl
    cached_dirs:
    - /root/.gradle
    - /opt/android/sdk
    shell: BASH
    docker_image_name: library/eclipse-temurin
    docker_image_tag: 25
