- pipeline: expensesapp
  name: ExpensesApp
  refs:
  - refs/heads/main
  fail_on_prepare_env_warning: true
  events:
  - type: WEBHOOK
  - type: PUSH
  arch: ARM64
  actions:
  - action: ./gradlew assembleRelease
    type: BUILD
    commands: |-
      export ANDROID_HOME="/opt/android/sdk"
      export PATH=$PATH:/opt/android/sdk/cmdline-tools/tools/bin
      if [ ! -d "$ANDROID_HOME/cmdline-tools" ]; then
       curl -o sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip
       unzip sdk.zip
       rm sdk.zip
       mkdir "$ANDROID_HOME/cmdline-tools"
       mv cmdline-tools "$ANDROID_HOME/cmdline-tools/tools"
       yes | "$ANDROID_HOME/cmdline-tools/tools/bin/sdkmanager" --licenses
      fi

      chmod +x gradlew
      #./gradlew assembleDebug
      ./gradlew assembleRelease
    setup_commands: apt-get update && apt-get install -y unzip curl
    cached_dirs:
    - /root/.gradle
    - /opt/android/sdk
    shell: BASH
    docker_image_name: library/eclipse-temurin
    docker_image_tag: 25
  - action: ./gradlew assembleRelease 2
    type: BUILD
    commands: |-
      #Install Android SDK

      #Buddy
      export ANDROID_HOME="/opt/android/sdk"
      export PATH=$PATH:/opt/android/sdk/cmdline-tools/tools/bin
      export PATH=$PATH:/opt/gradle/gradle-9.3.0/bin
      if [ ! -d "$ANDROID_HOME/cmdline-tools" ]; then
       curl -o sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip
       unzip sdk.zip
       rm sdk.zip
       mkdir "$ANDROID_HOME/cmdline-tools"
       mv cmdline-tools "$ANDROID_HOME/cmdline-tools/tools"
       yes | "$ANDROID_HOME/cmdline-tools/tools/bin/sdkmanager" --licenses
      fi
      #Buddy

      npm install
      npm install @capacitor/android
      ionic capacitor sync android --prod
      cd android
      #./gradlew bundle
      ./gradlew assembleRelease
    setup_commands: |-
      # install gradle
      apt-get update && apt-get install -y zip findutils unzip curl
      curl -L -Of https://services.gradle.org/distributions/gradle-9.3.0-bin.zip
      mkdir /opt/gradle
      unzip -d /opt/gradle gradle-9.3.0-bin.zip
      # install nodejs
      apt-get install -y ca-certificates gnupg
      curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
      apt-get install -y nodejs
      npm install -g @ionic/cli
    cached_dirs:
    - /root/.gradle
    - /opt/android/sdk
    shell: BASH
    docker_image_name: library/eclipse-temurin
    docker_image_tag: 17
